<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Porto Arquitectura</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --black:#050505;
  --white:#f4efe6;
  --muted:#a69d90;
  --gold:#c3a05f;
  --line:rgba(244,239,230,.14);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:var(--black);
  color:var(--white);
}

a{text-decoration:none;color:inherit}

img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* NAV */

.nav{
  position:fixed;
  width:100%;
  height:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 5vw;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(12px);
  z-index:100;
}

.brand{
  font-weight:800;
  letter-spacing:0.25em;
}

.nav-links{
  display:flex;
  gap:20px;
  font-size:12px;
}

/* HERO */

.hero{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  min-height:100vh;
  padding-top:70px;
}

.hero-image img{
  filter:brightness(.65);
}

.hero-content{
  display:flex;
  align-items:center;
  padding:6vw;
}

h1{
  font-size:80px;
  font-weight:900;
  line-height:.9;
}

.lead{
  margin:25px 0;
  color:#ccc;
}

.actions{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.btn{
  padding:14px 24px;
  background:var(--gold);
  color:black;
  font-size:12px;
}

.btn-outline{
  padding:14px 24px;
  border:1px solid #777;
  font-size:12px;
}

/* PROYECTOS */

.section{
  padding:100px 5vw;
}

.projects{
  display:grid;
  grid-template-columns:1.5fr 1fr;
  gap:1px;
  background:var(--line);
  border:1px solid var(--line);
}

.project{
  position:relative;
  min-height:70vh;
}

.project.large{
  min-height:85vh;
}

.project img{
  transition:.6s;
  filter:brightness(.7);
}

.project:hover img{
  transform:scale(1.05);
  filter:brightness(.55);
}

.project-info{
  position:absolute;
  bottom:30px;
  left:30px;
}

.project-info span{
  color:var(--gold);
  font-size:11px;
  letter-spacing:.2em;
}

.project-info h3{
  font-size:40px;
}

/* CONTACTO */

.contact{
  padding:100px 5vw;
}

@media(max-width:900px){

.hero{grid-template-columns:1fr}

.projects{
  grid-template-columns:1fr;
}

.project,
.project.large{
  min-height:60vh;
}

}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="brand">PORTO ARQUITECTURA</div>
  <div class="nav-links">
    <a href="#proyectos">Proyectos</a>
    <a href="#contacto">Contacto</a>
  </div>
</div>

<!-- HERO -->
<section class="hero">

<div class="hero-image">
<img src="render-tuyuti.jpg">
</div>

<div class="hero-content">
<div>

<h1>Arquitectura<br>real</h1>

<p class="lead">
Proyecto, documentación y dirección de obra en Canning, Ezeiza y Zona Sur.
</p>

<div class="actions">

<a class="btn" href="https://wa.me/5491161309100" target="_blank">
Iniciar proyecto
</a>

<a class="btn-outline" href="https://www.instagram.com/portoarquitectura_" target="_blank">
Instagram
</a>

</div>

</div>
</div>

</section>

<!-- PROYECTOS -->
<section id="proyectos" class="section">

<h2 style="margin-bottom:40px;">Proyectos</h2>

<div class="projects">

<div class="project large">
<img src="./render-tuyuti.jpg">
<div class="project-info">
<span>Obra en ejecución</span>
<h3>Tuyutí 437</h3>
</div>
</div>

<div class="project">
<img src="./el-amanecer.jpg">
<div class="project-info">
<span>Departamentos</span>
<h3>El Amanecer</h3>
</div>
</div>

</div>

</section>

<!-- CONTACTO -->
<section id="contacto" class="contact">

<h2>Contacto</h2>

<p style="margin:20px 0;">
contacto@portoarquitectura.com
</p>

<a class="btn" href="https://www.instagram.com/portoarquitectura_" target="_blank">
Ver Instagram
</a>

</section>

</body>
</html>
